name: newapi

# 动启动命令
# sudo docker compose -f docker-compose.local-data.yml up -d
# 手动停止：
# sudo docker compose -f docker-compose.local-data.yml down
# 手动查看状态：
# sudo docker compose -f docker-compose.local-data.yml ps

# sudo systemctl stop new-api
# sudo docker stop postgres redis
# sudo mkdir -p ./volumes/postgres-data ./volumes/redis-data
# sudo docker cp postgres:/var/lib/postgresql/data/. ./volumes/postgres-data/
# sudo docker cp redis:/data/. ./volumes/redis-data/
# sudo chown -R 999:999 ./volumes/postgres-data
# 6. 从旧容器把最新真实数据复制到项目根目录 ./volumes
# sudo docker cp postgres:/var/lib/postgresql/data/. ./volumes/postgres-data/
# sudo docker cp redis:/data/. ./volumes/redis-data/

# 7. 修正 PostgreSQL 数据目录权限
# sudo chown -R 999:999 ./volumes/postgres-data

# 8. 用本地这套 compose 在默认端口启动
# sudo docker compose -f docker-compose.local-data.yml up -d

# 9. 验证容器状态
# sudo docker compose -f docker-compose.local-data.yml ps

# 10. 验证 PostgreSQL
# sudo docker compose -f docker-compose.local-data.yml exec -T postgres pg_isready -U root -d new-api
# sudo docker compose -f docker-compose.local-data.yml exec -T postgres psql -U root -d new-api -c 'select current_database(), current_user;'

# 11. 验证 Redis
# sudo docker compose -f docker-compose.local-data.yml exec -T redis redis-cli ping

# 12. 验证通过后，再启动 new-api
# sudo systemctl start new-api
# sudo journalctl -u new-api -f

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "new-api"
      POSTGRES_USER: "root"
      POSTGRES_PASSWORD: "123456"
      PGDATA: "/var/lib/postgresql/data"
    volumes:
      - ./volumes/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:latest
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - ./volumes/redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
